<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Spin To Win MVP</title>
    <style>
      @font-face {
        font-family: "ZeroCool";
        src: url("assets/fonts/ZeroCool.woff2") format("woff2");
        font-display: swap;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101612;
        color: #eef7ee;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
        touch-action: none;
      }

      body:not(.match-started) canvas,
      body:not(.match-started) .rpm-hud,
      body:not(.match-started) .mobile-controls {
        visibility: hidden;
      }

      .main-menu {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(320px, 42vw) minmax(300px, 1fr);
        align-items: center;
        gap: 32px;
        padding: clamp(20px, 5vw, 78px);
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(18, 30, 26, 0.58), rgba(18, 30, 26, 0.18) 45%, rgba(18, 30, 26, 0.34)),
          var(--menu-background) center / cover no-repeat,
          #172820;
      }

      .main-menu[hidden] {
        display: none;
      }

      .menu-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        max-width: 560px;
      }

      .menu-title {
        margin: 0 0 10px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(38px, 6vw, 82px);
        line-height: 0.92;
        letter-spacing: 0;
        text-shadow: 0 5px 0 rgba(71, 45, 39, 0.55), 0 12px 22px rgba(0, 0, 0, 0.35);
      }

      .menu-section-label {
        color: rgba(255, 255, 255, 0.78);
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 18px;
        text-transform: uppercase;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      }

      .menu-action,
      .menu-mode {
        min-height: 58px;
        border: 0;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1;
        letter-spacing: 0;
        text-align: left;
        text-transform: uppercase;
        transform: skewX(-9deg);
        cursor: pointer;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 20px rgba(0, 0, 0, 0.3));
        transition: background 140ms ease, filter 140ms ease, transform 140ms ease;
      }

      .menu-action span,
      .menu-mode span {
        display: inline-block;
        transform: skewX(9deg);
      }

      .menu-action {
        width: min(470px, 88vw);
        padding: 12px 34px;
        background: linear-gradient(105deg, #cb2e27, #e84b3c 72%, rgba(255, 255, 255, 0) 72%);
      }

      .menu-action:hover {
        transform: translateY(-3px) scale(1.025) skewX(-9deg);
        background: linear-gradient(105deg, #e13a31, #ff6a52 72%, rgba(255, 255, 255, 0) 72%);
        filter: drop-shadow(0 13px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 0 20px rgba(255, 214, 132, 0.35));
      }

      .menu-action:active {
        transform: translateY(2px) scale(0.985) skewX(-9deg);
        filter: drop-shadow(0 5px 0 rgba(0, 0, 0, 0.3)) drop-shadow(0 8px 14px rgba(0, 0, 0, 0.28));
      }

      .menu-modes {
        display: flex;
        flex-direction: column;
        gap: 13px;
        width: min(430px, 84vw);
      }

      .menu-mode {
        position: relative;
        width: 100%;
        padding: 11px 26px;
        background: linear-gradient(105deg, rgba(75, 132, 178, 0.92), rgba(98, 164, 210, 0.86) 78%, rgba(255, 255, 255, 0) 78%);
      }

      .menu-mode.active {
        outline: 2px solid rgba(255, 255, 255, 0.8);
      }

      .menu-mode:not(:disabled):hover {
        transform: translateY(-2px) scale(1.018) skewX(-9deg);
        background: linear-gradient(105deg, rgba(96, 158, 206, 0.96), rgba(129, 190, 232, 0.9) 78%, rgba(255, 255, 255, 0) 78%);
        filter: drop-shadow(0 12px 0 rgba(0, 0, 0, 0.26)) drop-shadow(0 0 18px rgba(255, 255, 255, 0.24));
      }

      .menu-mode:not(:disabled):active {
        transform: translateY(2px) scale(0.99) skewX(-9deg);
        filter: drop-shadow(0 5px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 8px 12px rgba(0, 0, 0, 0.25));
      }

      .menu-mode:disabled {
        cursor: default;
        opacity: 0.72;
        background: linear-gradient(105deg, rgba(74, 77, 88, 0.9), rgba(93, 96, 109, 0.82) 78%, rgba(255, 255, 255, 0) 78%);
      }

      .soon-badge {
        position: absolute;
        right: 40px;
        top: 50%;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        transform: translateY(-50%) skewX(9deg);
      }

      .menu-settings {
        display: grid;
        gap: 10px;
        width: min(430px, 84vw);
        padding-top: 2px;
      }

      .menu-setting-row,
      .menu-difficulty-row {
        display: grid;
        grid-template-columns: 110px 1fr 34px;
        align-items: center;
        gap: 9px;
        min-height: 30px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 15px;
        text-transform: uppercase;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      }

      .menu-difficulty-row {
        grid-template-columns: 110px 1fr;
      }

      .menu-difficulty-buttons {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
      }

      .menu-difficulty-buttons button {
        min-height: 27px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        background: rgba(14, 24, 22, 0.66);
        color: #ffffff;
        font: inherit;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease, filter 120ms ease;
      }

      .menu-difficulty-buttons button.active {
        border-color: #ffffff;
        background: rgba(207, 47, 39, 0.88);
      }

      .menu-difficulty-buttons button:hover {
        border-color: rgba(255, 255, 255, 0.7);
        background: rgba(48, 78, 72, 0.82);
        transform: translateY(-1px) scale(1.02);
        filter: brightness(1.12);
      }

      .menu-difficulty-buttons button:active {
        transform: translateY(1px) scale(0.98);
        filter: brightness(0.94);
      }

      .menu-setting-row input {
        width: 100%;
      }

      .menu-setting-row output {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .element-panel {
        justify-self: center;
        display: grid;
        gap: 18px;
      }

      .element-title {
        color: rgba(255, 255, 255, 0.78);
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 18px;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 2px 7px rgba(0, 0, 0, 0.45);
      }

      .element-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(130px, 190px));
        gap: clamp(18px, 4vw, 48px);
      }

      .element-choice {
        width: clamp(132px, 16vw, 196px);
        aspect-ratio: 1.24;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 18px rgba(0, 0, 0, 0.25));
        transition: transform 160ms ease, filter 160ms ease;
      }

      .element-choice img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
      }

      .element-choice:hover {
        transform: translateY(-6px) scale(1.04);
        filter:
          drop-shadow(0 0 0 rgba(255, 255, 255, 0.9))
          drop-shadow(0 14px 0 rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 20px rgba(255, 255, 255, 0.55));
      }

      .element-choice.selected {
        transform: translateY(-8px) scale(1.08);
        filter:
          drop-shadow(0 0 3px rgba(255, 238, 126, 0.95))
          drop-shadow(0 16px 0 rgba(0, 0, 0, 0.25))
          drop-shadow(0 0 28px rgba(255, 217, 61, 0.95))
          drop-shadow(0 0 48px rgba(255, 190, 46, 0.55));
      }

      .element-choice.selected:hover {
        transform: translateY(-10px) scale(1.11);
        filter:
          drop-shadow(0 0 5px rgba(255, 250, 190, 1))
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.24))
          drop-shadow(0 0 34px rgba(255, 226, 74, 1))
          drop-shadow(0 0 58px rgba(255, 180, 42, 0.7));
      }

      .element-choice:active,
      .element-choice.selected:active {
        transform: translateY(-2px) scale(0.99);
      }

      .settings-panel {
        display: none !important;
      }

      .texture-settings-panel {
        position: fixed;
        top: 86px;
        right: 16px;
        z-index: 8;
        display: none;
        flex-direction: column;
        gap: 7px;
        width: 270px;
        padding: 9px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.72);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.24);
        color: rgba(238, 247, 238, 0.9);
        font-size: 12px;
        pointer-events: auto;
        user-select: none;
      }

      body.match-started .texture-settings-panel {
        display: flex;
      }

      .texture-settings-title {
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0;
      }

      .texture-settings-tabs {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 4px;
      }

      .texture-settings-tab {
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.24);
        color: rgba(238, 247, 238, 0.9);
        font: inherit;
        font-weight: 800;
        cursor: pointer;
      }

      .texture-settings-tab.active {
        background: rgba(75, 132, 178, 0.72);
      }

      .texture-settings-page {
        display: none;
        flex-direction: column;
        gap: 7px;
      }

      .texture-settings-page.active {
        display: flex;
      }

      .texture-settings-panel:has([data-texture-tab="camera"]:checked) [data-texture-page="textures"],
      .texture-settings-panel:has([data-texture-tab="textures"]:checked) [data-texture-page="camera"] {
        display: none;
      }

      .texture-settings-panel:has([data-texture-tab="textures"]:checked) [data-texture-page="textures"],
      .texture-settings-panel:has([data-texture-tab="camera"]:checked) [data-texture-page="camera"] {
        display: flex;
      }

      .texture-settings-panel input[name="texture-settings-tab"] {
        display: none;
      }

      .texture-settings-panel:has([data-texture-tab="textures"]:checked) label[for="texture-tab-textures"],
      .texture-settings-panel:has([data-texture-tab="camera"]:checked) label[for="texture-tab-camera"] {
        background: rgba(75, 132, 178, 0.72);
      }

      .texture-settings-panel .setting-row {
        grid-template-columns: 72px 1fr 64px;
      }

      .texture-settings-panel .setting-row.wide {
        grid-template-columns: 1fr auto;
      }

      .texture-settings-panel input[type="number"] {
        width: 64px;
        min-width: 0;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 4px;
        background: rgba(0, 0, 0, 0.22);
        color: rgba(238, 247, 238, 0.95);
        font: inherit;
        font-variant-numeric: tabular-nums;
      }

      .fps-counter {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 6;
        padding: 5px 7px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 4px;
        background: rgba(7, 11, 9, 0.64);
        color: rgba(238, 247, 238, 0.9);
        font: 700 11px/1.1 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        user-select: none;
      }

      .deathmatch-scoreboard-button {
        position: fixed;
        top: 16px;
        right: 10px;
        z-index: 9;
        width: min(300px, calc(100vw - 20px));
        min-height: 58px;
        padding: 12px 28px;
        border: 0;
        background: linear-gradient(105deg, rgba(75, 132, 178, 0.92), rgba(98, 164, 210, 0.86) 78%, rgba(255, 255, 255, 0) 78%);
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(24px, 2.6vw, 36px);
        line-height: 1;
        letter-spacing: 0;
        text-align: left;
        text-transform: uppercase;
        transform: skewX(-9deg);
        cursor: pointer;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 20px rgba(0, 0, 0, 0.3));
        user-select: none;
      }

      .deathmatch-scoreboard-button span {
        display: inline-block;
        transform: skewX(9deg);
      }

      .deathmatch-scoreboard-button.active {
        outline: 2px solid rgba(255, 255, 255, 0.8);
      }

      body:not(.match-started) .deathmatch-scoreboard-button {
        display: none;
      }

      .deathmatch-overlay {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 8;
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 80vw;
        height: 80vh;
        padding: clamp(18px, 3vw, 34px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.85);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.48);
        color: rgba(238, 247, 238, 0.92);
        transform: translate(-50%, -50%);
        user-select: none;
      }

      .deathmatch-overlay[hidden],
      body:not(.match-started) .deathmatch-overlay {
        display: none;
      }

      .deathmatch-leaderboard {
        min-height: 0;
        overflow: auto;
      }

      .deathmatch-leaderboard-title {
        margin-bottom: 18px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(36px, 6vw, 76px);
        line-height: 0.9;
        text-transform: uppercase;
      }

      .deathmatch-leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        font: 800 clamp(16px, 2.2vw, 30px)/1.2 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
      }

      .deathmatch-leaderboard-table th,
      .deathmatch-leaderboard-table td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        text-align: right;
        white-space: nowrap;
      }

      .deathmatch-leaderboard-table th {
        color: rgba(255, 255, 255, 0.58);
        font-size: 0.72em;
        text-transform: uppercase;
      }

      .deathmatch-leaderboard-table th:nth-child(2),
      .deathmatch-leaderboard-table td:nth-child(2) {
        text-align: left;
      }

      .deathmatch-leaderboard-table tr.player td {
        color: #8bd3ff;
      }

      .deathmatch-leaderboard-table tr.respawning td,
      .deathmatch-leaderboard-table tr.invulnerable td {
        color: #ffffff;
      }

      .deathmatch-continue {
        align-self: flex-start;
        width: min(470px, 88vw);
        min-height: 58px;
        margin-top: auto;
        padding: 12px 34px;
        border: 0;
        background: linear-gradient(105deg, rgba(74, 77, 88, 0.9), rgba(93, 96, 109, 0.82) 78%, rgba(255, 255, 255, 0) 78%);
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1;
        letter-spacing: 0;
        text-align: left;
        text-transform: uppercase;
        transform: skewX(-9deg);
        pointer-events: auto;
        cursor: default;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 20px rgba(0, 0, 0, 0.3));
      }

      .deathmatch-continue span {
        display: inline-block;
        transform: skewX(9deg);
      }

      .deathmatch-continue:disabled {
        opacity: 0.72;
        cursor: default;
      }

      .deathmatch-continue.ready {
        background: linear-gradient(105deg, #d3a421, #f2ce48 72%, rgba(255, 255, 255, 0) 72%);
        cursor: pointer;
      }

      .deathmatch-continue[hidden] {
        display: none;
      }

      .rpm-hud {
        position: fixed;
        bottom: 18px;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: min(260px, calc(50vw - 28px));
        pointer-events: none;
        user-select: none;
      }

      .rpm-hud.player {
        left: 18px;
      }

      .rpm-hud.enemies {
        right: 18px;
        flex-direction: column-reverse;
      }

      .settings-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 7px;
        width: 250px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.62);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        color: rgba(238, 247, 238, 0.86);
        font-size: 12px;
        pointer-events: auto;
        user-select: none;
      }

      .setting-row {
        position: relative;
        display: grid;
        grid-template-columns: 82px 1fr 36px;
        align-items: center;
        gap: 8px;
      }

      .setting-row input {
        width: 100%;
      }

      .setting-row output {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .setting-row.debug-toggle {
        grid-template-columns: 1fr 20px 36px;
      }

      .setting-row:has([data-control-setting]),
      .setting-row.debug-toggle {
        display: none;
      }

      .setting-row.debug-toggle input {
        justify-self: end;
        width: 16px;
        height: 16px;
      }

      .difficulty-row {
        display: grid;
        grid-template-columns: 82px 1fr;
        align-items: center;
        gap: 8px;
      }

      .difficulty-buttons {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 3px;
      }

      .difficulty-buttons button {
        height: 24px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(238, 247, 238, 0.82);
        font: inherit;
        cursor: pointer;
      }

      .difficulty-buttons button.active {
        border-color: rgba(77, 172, 255, 0.95);
        background: rgba(24, 120, 255, 0.42);
        color: #ffffff;
      }

      .setting-row:hover::after,
      .difficulty-row:hover::after {
        position: absolute;
        right: 0;
        bottom: calc(100% + 6px);
        width: min(300px, calc(100vw - 24px));
        padding: 7px 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        background: rgba(7, 11, 9, 0.92);
        color: #eef7ee;
        content: attr(data-tooltip);
        font-size: 11px;
        line-height: 1.25;
        pointer-events: none;
      }

      .difficulty-row {
        position: relative;
      }

      .rpm-card {
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.62);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }

      .rpm-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 5px;
        font-size: 11px;
        line-height: 1;
        color: rgba(238, 247, 238, 0.82);
        font-variant-numeric: tabular-nums;
      }

      .rpm-track {
        position: relative;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .rpm-cap,
      .rpm-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 100%;
        border-radius: inherit;
        transform-origin: left center;
      }

      .rpm-cap {
        background: #c92d3b;
      }

      .rpm-fill {
        background: #34d15f;
      }

      .rpm-card.enemy .rpm-fill {
        background: #34d15f;
      }

      .rpm-card.respawning,
      .rpm-card.invulnerable {
        border-color: rgba(255, 255, 255, 0.34);
      }

      .bonus-icons {
        display: flex;
        align-items: center;
        gap: 5px;
        min-height: 25px;
        margin-bottom: 6px;
      }

      .bonus-icons[hidden] {
        display: none;
      }

      .bonus-icon {
        position: relative;
        width: 24px;
        height: 24px;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--bonus-color) 72%, white 28%);
        border-radius: 4px;
        background:
          radial-gradient(circle at 50% 30%, color-mix(in srgb, var(--bonus-color) 48%, transparent), transparent 68%),
          rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 8px color-mix(in srgb, var(--bonus-color) 55%, transparent);
      }

      .bonus-icon-fill,
      .bonus-icon-grid {
        position: absolute;
        inset: 0;
      }

      .bonus-icon-fill {
        background: color-mix(in srgb, var(--bonus-color) 62%, transparent);
        transform-origin: bottom center;
        transition: transform 120ms linear;
      }

      .bonus-icon-grid {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.26) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.26) 1px, transparent 1px);
        background-size: 6px 6px;
        opacity: 0.8;
        mix-blend-mode: screen;
      }

      .dash-card,
      .ultimate-card {
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.62);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }

      .dash-label,
      .ultimate-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 5px;
        font-size: 11px;
        line-height: 1;
        color: rgba(238, 247, 238, 0.82);
        font-variant-numeric: tabular-nums;
        text-transform: uppercase;
      }

      .dash-track,
      .ultimate-track {
        position: relative;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .dash-fill,
      .ultimate-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 100%;
        border-radius: inherit;
        background: #4dacff;
        transform-origin: left center;
      }

      .dash-card.ready .dash-fill {
        background: #ffffff;
      }

      .dash-card.active .dash-fill {
        background: #ffd83d;
      }

      .ultimate-fill {
        background: #f26bdc;
      }

      .ultimate-card.ready .ultimate-fill {
        background: #ffffff;
      }

      .ultimate-card.active .ultimate-fill {
        background: #8bd3ff;
      }

      .mobile-controls {
        position: fixed;
        inset: auto 0 0;
        z-index: 4;
        display: none;
        justify-content: space-between;
        align-items: flex-end;
        padding: 0 18px 18px;
        pointer-events: none;
      }

      .mobile-joystick,
      .mobile-action-button {
        pointer-events: auto;
        touch-action: none;
        user-select: none;
        -webkit-user-select: none;
      }

      .mobile-joystick {
        position: relative;
        width: 118px;
        height: 118px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        background:
          radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.15), rgba(255, 255, 255, 0.06) 42%, rgba(7, 11, 9, 0.46) 72%),
          rgba(7, 11, 9, 0.45);
        box-shadow: 0 12px 26px rgba(0, 0, 0, 0.3);
      }

      .mobile-joystick.active {
        border-color: rgba(255, 255, 255, 0.46);
      }

      .mobile-joystick-thumb {
        position: absolute;
        top: 50%;
        left: 50%;
        width: 54px;
        height: 54px;
        border-radius: 999px;
        background: linear-gradient(145deg, #ffffff, #9bd9ff);
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.35), 0 0 18px rgba(77, 172, 255, 0.38);
        transform: translate(-50%, -50%);
      }

      .mobile-action-buttons {
        display: flex;
        align-items: flex-end;
        gap: 12px;
        pointer-events: none;
      }

      .mobile-action-button {
        width: 72px;
        height: 72px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 999px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 20px;
        line-height: 1;
        letter-spacing: 0;
        text-transform: uppercase;
        background:
          radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.28), transparent 42%),
          rgba(7, 11, 9, 0.66);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.34);
      }

      .mobile-action-button.ready {
        border-color: rgba(255, 255, 255, 0.72);
        box-shadow: 0 12px 24px rgba(0, 0, 0, 0.34), 0 0 18px rgba(255, 255, 255, 0.28);
      }

      .mobile-action-button.active {
        border-color: #ffd83d;
        background:
          radial-gradient(circle at 50% 28%, rgba(255, 255, 255, 0.3), transparent 42%),
          rgba(120, 73, 12, 0.78);
      }

      .mobile-action-button:disabled {
        opacity: 0.48;
      }

      @media (max-width: 640px) {
        .deathmatch-scoreboard-button {
          top: 40px;
          width: min(260px, calc(100vw - 20px));
        }

        .deathmatch-overlay {
          width: 88vw;
          height: 82vh;
        }

        .main-menu {
          grid-template-columns: 1fr;
          align-content: start;
          gap: 20px;
          padding: 18px;
          overflow-y: auto;
        }

        .menu-left {
          gap: 12px;
        }

        .menu-title {
          font-size: 38px;
        }

        .menu-action,
        .menu-mode {
          min-height: 48px;
          font-size: 24px;
        }

        .element-panel {
          justify-self: start;
        }

        .element-title {
          text-align: left;
        }

        .element-grid {
          grid-template-columns: repeat(4, minmax(66px, 1fr));
          gap: 8px;
          width: calc(100vw - 36px);
        }

        .element-choice {
          width: 100%;
        }

        .rpm-hud {
          bottom: 12px;
          width: min(190px, calc(50vw - 18px));
        }

        .rpm-hud.player {
          left: 10px;
        }

        .rpm-hud.enemies {
          right: 10px;
        }

        .bonus-icons {
          gap: 4px;
          min-height: 22px;
          margin-bottom: 5px;
        }

        .bonus-icon {
          width: 21px;
          height: 21px;
          border-radius: 4px;
        }

        .bonus-icon-grid {
          background-size: 5px 5px;
        }

        .settings-panel {
          top: 10px;
          right: 10px;
          width: min(245px, calc(100vw - 20px));
        }
      }

      @media (hover: none), (pointer: coarse), (max-width: 760px) {
        body.match-started .mobile-controls {
          display: flex;
        }
      }
    </style>
  </head>
  <body>
    <section class="main-menu" data-start-menu>
      <div class="menu-left">
        <h1 class="menu-title" data-i18n="game.title">Turbo Spin Arena</h1>

        <div class="menu-section-label" data-i18n="menu.mode">Mode</div>
        <div class="menu-modes">
          <button class="menu-mode active" type="button" aria-pressed="true">
            <span data-i18n="mode.multiplayer">Multiplayer</span>
          </button>
          <button class="menu-mode" type="button" disabled>
            <span data-i18n="mode.survival">Survival</span>
            <small class="soon-badge" data-i18n="mode.unavailable">Soon</small>
          </button>
        </div>

        <div class="menu-section-label" data-i18n="menu.settings">Settings</div>
        <div class="menu-settings">
          <label class="menu-setting-row">
            <span data-i18n="settings.enemies">Bots</span>
            <input data-enemy-count type="range" min="0" max="9" step="1" value="1" />
            <output data-enemy-count-value>1</output>
          </label>
          <div class="menu-difficulty-row">
            <span data-i18n="settings.botLevel">Bot level</span>
            <div class="menu-difficulty-buttons">
              <button data-bot-difficulty="easy" type="button" data-i18n="bot.easy">Easy</button>
              <button data-bot-difficulty="normal" type="button" data-i18n="bot.normal">Normal</button>
              <button data-bot-difficulty="hard" type="button" data-i18n="bot.hard">Hard</button>
            </div>
          </div>
        </div>

        <button class="menu-action" type="button" data-start-match>
          <span data-i18n="menu.start">Start</span>
        </button>
      </div>

      <div class="element-panel">
        <div class="element-title" data-i18n="menu.selectElement">Select element</div>
        <div class="element-grid">
          <button class="element-choice" type="button" data-element-choice="fire" aria-pressed="false"><img alt="" /></button>
          <button class="element-choice" type="button" data-element-choice="ice" aria-pressed="false"><img alt="" /></button>
          <button class="element-choice" type="button" data-element-choice="earth" aria-pressed="false"><img alt="" /></button>
          <button class="element-choice" type="button" data-element-choice="lightning" aria-pressed="true"><img alt="" /></button>
        </div>
      </div>
    </section>
    <div class="settings-panel">
    <label class="setting-row" data-tooltip="Количество ботов на арене. Движение, RPM и урон у них считаются по тем же правилам, что у игрока.">
      <span>Enemies</span>
      <input data-enemy-count type="range" min="0" max="9" step="1" value="1" />
      <output data-enemy-count-value>1</output>
    </label>
      <label class="setting-row" data-tooltip="Runtime test control for arena bowl depth. Higher value makes the center lower.">
        <span>Bowl depth</span>
        <input data-bowl-depth type="range" min="0" max="4.2" step="0.02" value="0.46" />
        <output data-bowl-depth-value>0.46</output>
      </label>
      <label class="setting-row" data-tooltip="Slope acceleration strength. Higher value makes downhill faster and uphill harder.">
        <span>Slope gravity</span>
        <input data-slope-setting="slopeGravity" type="range" min="0" max="300" step="0.5" value="8" />
        <output data-slope-value="slopeGravity">8.0</output>
      </label>
      <label class="setting-row" data-tooltip="Extra speed allowed from downhill movement before the velocity cap stops it.">
        <span>Slope boost</span>
        <input data-slope-setting="maxSlopeBoost" type="range" min="0" max="16" step="0.5" value="4" />
        <output data-slope-value="maxSlopeBoost">4.0</output>
      </label>
      <label class="setting-row" data-tooltip="Distance used to sample arena height around the spinner. Higher value smooths small bumps.">
        <span>Slope sample</span>
        <input data-slope-setting="slopeSampleDistance" type="range" min="0.1" max="2" step="0.05" value="0.6" />
        <output data-slope-value="slopeSampleDistance">0.60</output>
      </label>
      <label class="setting-row" data-tooltip="Where soft rim resistance starts as a ratio of arena radius.">
        <span>Rim start</span>
        <input data-rim-setting="rimResistanceStartRatio" type="range" min="0.5" max="1" step="0.01" value="0.82" />
        <output data-rim-value="rimResistanceStartRatio">0.82</output>
      </label>
      <label class="setting-row" data-tooltip="Soft inward force near the white rim. Higher values make the edge harder to cross.">
        <span>Rim force</span>
        <input data-rim-setting="rimResistanceStrength" type="range" min="0" max="240" step="2" value="40" />
        <output data-rim-value="rimResistanceStrength">40.0</output>
      </label>
      <label class="setting-row" data-tooltip="Extra velocity budget used by rim resistance before speed is capped again.">
        <span>Rim boost</span>
        <input data-rim-setting="rimResistanceMaxBoost" type="range" min="0" max="60" step="1" value="12" />
        <output data-rim-value="rimResistanceMaxBoost">12.0</output>
      </label>
      <label class="setting-row" data-tooltip="Максимальная скорость следования за целью при полном RPM. Чем выше значение, тем быстрее спиннер догоняет курсор или AI-цель.">
        <span>Max speed</span>
        <input data-control-setting="baseMoveSpeed" type="range" min="10" max="20" step="0.5" value="16" />
        <output data-control-value="baseMoveSpeed">16.0</output>
      </label>
      <label class="setting-row" data-tooltip="Сила пружины к цели. Больше значение - спиннер агрессивнее ускоряется к курсору или AI-цели, но скорость все равно ограничена Max speed.">
        <span>Spring</span>
        <input data-control-setting="springStrength" type="range" min="1" max="25" step="1" value="15" />
        <output data-control-value="springStrength">15</output>
      </label>
      <label class="setting-row" data-tooltip="Демпфирование пружины. Больше значение сильнее гасит инерцию и перелет, меньше значение делает движение более резиновым.">
        <span>Damping</span>
        <input data-control-setting="springDamping" type="range" min="0" max="5" step="0.5" value="1.5" />
        <output data-control-value="springDamping">1.5</output>
      </label>
      <label class="setting-row" data-tooltip="Минимальная доля скорости при низком RPM. Например 45% значит, что почти выбитый спиннер все еще движется, но сильно медленнее.">
        <span>Low RPM</span>
        <input data-control-setting="minMoveSpeedRatio" type="range" min="0" max="1" step="0.01" value="0.3" />
        <output data-control-value="minMoveSpeedRatio">30%</output>
      </label>
      <label class="setting-row" data-tooltip="Максимальное количество ботов, которые могут одновременно находиться в активной фазе тарана.">
        <span>Attacks</span>
        <input data-control-setting="globalAttackLimit" type="range" min="0" max="9" step="1" value="2" />
        <output data-control-value="globalAttackLimit">2</output>
      </label>
      <label class="setting-row" data-tooltip="Максимальное количество активных таранов по одной и той же цели.">
        <span>Per target</span>
        <input data-control-setting="maxAttackersPerTarget" type="range" min="0" max="5" step="1" value="1" />
        <output data-control-value="maxAttackersPerTarget">1</output>
      </label>
      <label class="setting-row" data-tooltip="Дистанция разгона: бот старается занять эту позицию перед фиксацией тарана.">
        <span>Windup</span>
        <input data-control-setting="windupDistance" type="range" min="1.5" max="6" step="0.1" value="3.2" />
        <output data-control-value="windupDistance">3.2</output>
      </label>
      <label class="setting-row" data-tooltip="Сила локального уклонения, чтобы боты не слипались в толпу.">
        <span>Separate</span>
        <input data-control-setting="separationStrength" type="range" min="0" max="4" step="0.05" value="1.15" />
        <output data-control-value="separationStrength">1.15</output>
      </label>
      <label class="setting-row" data-tooltip="Коэффициент предсказания цели. Время прогноза считается как дистанция, умноженная на это значение.">
        <span>Predict</span>
        <input data-control-setting="predictionTurnFactor" type="range" min="0" max="0.08" step="0.001" value="0.035" />
        <output data-control-value="predictionTurnFactor">0.035</output>
      </label>
      <label class="setting-row" data-tooltip="Время восстановления после завершения или отмены атаки.">
        <span>Cooldown</span>
        <input data-control-setting="attackCooldown" type="range" min="0" max="2" step="0.05" value="0.65" />
        <output data-control-value="attackCooldown">0.65</output>
      </label>
      <label class="setting-row" data-tooltip="Штраф для целей, вокруг которых уже много спиннеров.">
        <span>Crowd</span>
        <input data-control-setting="crowdPenalty" type="range" min="0" max="4" step="0.05" value="1" />
        <output data-control-value="crowdPenalty">1.00</output>
      </label>
      <label class="setting-row" data-tooltip="Минимальная дистанция от бота до его виртуального курсора. Курсор не может заходить внутрь этого радиуса.">
        <span>Cursor radius</span>
        <input data-control-setting="botCursorMinRadius" type="range" min="2" max="10" step="0.1" value="4" />
        <output data-control-value="botCursorMinRadius">4.0</output>
      </label>
      <div class="difficulty-row" data-tooltip="Частота принятия новых AI-решений: Easy 600-1000 мс, Normal 350-600 мс, Hard 200-350 мс.">
        <span>Bot level</span>
        <div class="difficulty-buttons">
          <button data-bot-difficulty="easy" type="button">Easy</button>
          <button data-bot-difficulty="normal" type="button">Normal</button>
          <button data-bot-difficulty="hard" type="button">Hard</button>
        </div>
      </div>
      <label class="setting-row debug-toggle" data-tooltip="Показывает точку, в которую бот реально едет через followTargetPosition.">
        <span>Follow point</span>
        <input data-debug-display="followTarget" type="checkbox" checked />
        <output></output>
      </label>
      <label class="setting-row debug-toggle" data-tooltip="Показывает радиус локального разъезжания вокруг каждого бота.">
        <span>Separate radius</span>
        <input data-debug-display="separationRadius" type="checkbox" checked />
        <output></output>
      </label>
      <label class="setting-row debug-toggle" data-tooltip="Показывает радиус позиции разгона вокруг каждого бота.">
        <span>Windup radius</span>
        <input data-debug-display="windupRadius" type="checkbox" checked />
        <output></output>
      </label>
      <label class="setting-row debug-toggle" data-tooltip="Показывает минимальный радиус виртуального курсора вокруг каждого бота.">
        <span>Cursor radius</span>
        <input data-debug-display="cursorRadius" type="checkbox" checked />
        <output></output>
      </label>
    </div>
    <div class="texture-settings-panel" aria-label="Debug visual controls">
      <div class="texture-settings-tabs">
        <input id="texture-tab-textures" data-texture-tab="textures" name="texture-settings-tab" type="radio" checked />

        <span>Tex scale</span>

        <input data-arena-texture-setting="rotation" type="range" min="-180" max="180" step="1" value="0" />
        <input data-arena-texture-value="rotation" type="number" min="-180" max="180" step="1" value="0" />
      </label>
      <div class="texture-settings-title">Tile texture</div>
      <label class="setting-row" data-tooltip="Move the outer tile texture horizontally.">
        <span>Tile X</span>
        <input data-tile-texture-setting="offsetX" type="range" min="-1" max="1" step="0.01" value="0" />
        <input data-tile-texture-value="offsetX" type="number" min="-1" max="1" step="0.01" value="0" />
      </label>
      <label class="setting-row" data-tooltip="Move the outer tile texture vertically.">
        <span>Tile Y</span>
        <input data-tile-texture-setting="offsetY" type="range" min="-1" max="1" step="0.01" value="0" />
        <input data-tile-texture-value="offsetY" type="number" min="-1" max="1" step="0.01" value="0" />
      </label>
      <label class="setting-row" data-tooltip="Scale the outer tile texture. Higher values make the tiles larger.">
        <span>Tile scale</span>

        <input data-tile-texture-value="scale" type="number" min="0.2" max="4" step="0.01" value="1" />
      </label>
      <label class="setting-row" data-tooltip="Rotate the outer tile texture in degrees.">
        <span>Tile rot</span>
        <input data-tile-texture-setting="rotation" type="range" min="-180" max="180" step="1" value="0" />
        <input data-tile-texture-value="rotation" type="number" min="-180" max="180" step="1" value="0" />
      </label>
      <div class="texture-settings-title">Background texture</div>
      <label class="setting-row" data-tooltip="Move the backdrop texture horizontally.">
        <span>Bg X</span>
        <input data-backdrop-texture-setting="offsetX" type="range" min="-1" max="1" step="0.01" value="0" />
        <input data-backdrop-texture-value="offsetX" type="number" min="-1" max="1" step="0.01" value="0" />
      </label>
      <label class="setting-row" data-tooltip="Move the backdrop texture vertically.">
        <span>Bg Y</span>
        <input data-backdrop-texture-setting="offsetY" type="range" min="-1" max="1" step="0.01" value="0" />
        <input data-backdrop-texture-value="offsetY" type="number" min="-1" max="1" step="0.01" value="0" />
      </label>
      <label class="setting-row" data-tooltip="Scale the backdrop texture. Higher values make the image larger.">
        <span>Bg scale</span>
        <input data-backdrop-texture-setting="scale" type="range" min="0.5" max="3" step="0.01" value="1" />
        <input data-backdrop-texture-value="scale" type="number" min="0.5" max="3" step="0.01" value="1" />
      </label>
      </div>
      <div class="texture-settings-page" data-texture-page="camera">
      <div class="texture-settings-title">Game camera</div>
      <label class="setting-row"><span>Cam X</span><input data-camera-setting="gameX" type="range" min="-10" max="10" step="0.1" value="0" /><input data-camera-value="gameX" type="number" min="-10" max="10" step="0.1" value="0" /></label>
      <label class="setting-row"><span>Cam Y</span><input data-camera-setting="gameY" type="range" min="2" max="20" step="0.1" value="16" /><input data-camera-value="gameY" type="number" min="2" max="20" step="0.1" value="16" /></label>
      <label class="setting-row"><span>Cam Z</span><input data-camera-setting="gameZ" type="range" min="2" max="24" step="0.1" value="14.1" /><input data-camera-value="gameZ" type="number" min="2" max="24" step="0.1" value="14.1" /></label>
      <label class="setting-row"><span>Look X</span><input data-camera-setting="lookAtX" type="range" min="-8" max="8" step="0.1" value="0" /><input data-camera-value="lookAtX" type="number" min="-8" max="8" step="0.1" value="0" /></label>
      <label class="setting-row"><span>Look Y</span><input data-camera-setting="lookAtY" type="range" min="-2" max="6" step="0.1" value="-2" /><input data-camera-value="lookAtY" type="number" min="-2" max="6" step="0.1" value="-2" /></label>
      <label class="setting-row"><span>Look Z</span><input data-camera-setting="lookAtZ" type="range" min="-8" max="8" step="0.1" value="2.1" /><input data-camera-value="lookAtZ" type="number" min="-8" max="8" step="0.1" value="2.1" /></label>
      <label class="setting-row"><span>Min zoom</span><input data-camera-setting="minDistance" type="range" min="4" max="21" step="0.1" value="18" /><input data-camera-value="minDistance" type="number" min="4" max="21" step="0.1" value="18" /></label>
      <label class="setting-row"><span>Max zoom</span><input data-camera-setting="maxDistance" type="range" min="8" max="40" step="0.1" value="21" /><input data-camera-value="maxDistance" type="number" min="8" max="40" step="0.1" value="21" /></label>
      <div class="texture-settings-title">Death camera</div>
      <label class="setting-row"><span>Dead X</span><input data-camera-setting="deathOffsetX" type="range" min="-8" max="8" step="0.1" value="0" /><input data-camera-value="deathOffsetX" type="number" min="-8" max="8" step="0.1" value="0" /></label>
      <label class="setting-row"><span>Dead Y</span><input data-camera-setting="deathOffsetY" type="range" min="0" max="8" step="0.1" value="2.4" /><input data-camera-value="deathOffsetY" type="number" min="0" max="8" step="0.1" value="2.4" /></label>
      <label class="setting-row"><span>Dead Z</span><input data-camera-setting="deathOffsetZ" type="range" min="-2" max="10" step="0.1" value="5" /><input data-camera-value="deathOffsetZ" type="number" min="-2" max="10" step="0.1" value="5" /></label>
      <label class="setting-row"><span>DLook X</span><input data-camera-setting="deathLookAtX" type="range" min="-4" max="4" step="0.1" value="0" /><input data-camera-value="deathLookAtX" type="number" min="-4" max="4" step="0.1" value="0" /></label>
      <label class="setting-row"><span>DLook Y</span><input data-camera-setting="deathLookAtY" type="range" min="-1" max="4" step="0.1" value="1.1" /><input data-camera-value="deathLookAtY" type="number" min="-1" max="4" step="0.1" value="1.1" /></label>
      <label class="setting-row"><span>DLook Z</span><input data-camera-setting="deathLookAtZ" type="range" min="-4" max="4" step="0.1" value="0" /><input data-camera-value="deathLookAtZ" type="number" min="-4" max="4" step="0.1" value="0" /></label>
      <div class="texture-settings-title">Light</div>
      <label class="setting-row wide"><span>Disable all light</span><input data-light-disabled type="checkbox" /></label>
      <label class="setting-row"><span>Ambient</span><input data-light-setting="ambient" type="range" min="0" max="4" step="0.05" value="1.55" /><input data-light-value="ambient" type="number" min="0" max="4" step="0.05" value="1.55" /></label>
      <label class="setting-row"><span>Hemi</span><input data-light-setting="hemisphere" type="range" min="0" max="4" step="0.05" value="0.72" /><input data-light-value="hemisphere" type="number" min="0" max="4" step="0.05" value="0.72" /></label>
      <label class="setting-row"><span>Key</span><input data-light-setting="key" type="range" min="0" max="6" step="0.05" value="2.35" /><input data-light-value="key" type="number" min="0" max="6" step="0.05" value="2.35" /></label>
      <label class="setting-row"><span>Fill</span><input data-light-setting="fill" type="range" min="0" max="4" step="0.05" value="0.18" /><input data-light-value="fill" type="number" min="0" max="4" step="0.05" value="0.18" /></label>
      </div>
    </div>
    <div class="fps-counter" data-fps-counter>FPS: --</div>
    <button class="deathmatch-scoreboard-button" data-deathmatch-scoreboard type="button" aria-pressed="false">
      <span>Scoreboard</span>
    </button>
    <div class="deathmatch-overlay" data-deathmatch-overlay hidden>
      <div class="deathmatch-leaderboard" data-deathmatch-leaderboard></div>
      <button class="deathmatch-continue" data-deathmatch-continue type="button" hidden disabled>
        <span>Continue</span>
      </button>
    </div>
    <div class="mobile-controls" data-mobile-controls aria-hidden="false">
      <div class="mobile-joystick" data-mobile-joystick role="application" aria-label="Move">
        <div class="mobile-joystick-thumb" data-mobile-joystick-thumb></div>
      </div>
      <div class="mobile-action-buttons">
        <button class="mobile-action-button" data-mobile-dash type="button" data-i18n="hud.dash">Dash</button>
        <button class="mobile-action-button" data-mobile-ultimate type="button" data-i18n="hud.ultimate">Ultimate</button>
      </div>
    </div>
    <div class="rpm-hud player" data-player-rpm></div>
    <div class="rpm-hud enemies" data-enemy-rpms></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
