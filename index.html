<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>Spin To Win MVP</title>
    <style>
      @font-face {
        font-family: "ZeroCool";
        src: url("assets/fonts/ZeroCool.woff2") format("woff2");
        font-display: swap;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #101612;
        color: #eef7ee;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      canvas {
        position: fixed;
        inset: 0;
        z-index: 0;
        display: block;
        touch-action: none;
      }

      body:not(.match-started) canvas,
      body:not(.match-started) .rpm-hud,
      body:not(.match-started) .mobile-controls {
        visibility: hidden;
      }

      .orientation-overlay {
        position: fixed;
        inset: 0;
        z-index: 30;
        display: none;
        place-items: center;
        background: #101010;
      }

      .orientation-icon {
        position: relative;
        width: 112px;
        height: 94px;
        color: #ffffff;
      }

      .orientation-phone {
        position: absolute;
        border: 3px solid currentColor;
        border-radius: 7px;
      }

      .orientation-phone.portrait {
        left: 4px;
        top: 4px;
        width: 36px;
        height: 80px;
      }

      .orientation-phone.landscape {
        left: 25px;
        bottom: 0;
        width: 78px;
        height: 36px;
      }

      .orientation-arrow {
        position: absolute;
        left: 50px;
        top: 18px;
        width: 31px;
        height: 31px;
        border-top: 6px solid currentColor;
        border-right: 6px solid currentColor;
        border-radius: 0 24px 0 0;
        transform: rotate(28deg);
      }

      .orientation-arrow::after {
        position: absolute;
        right: -11px;
        bottom: -8px;
        width: 0;
        height: 0;
        border-left: 9px solid currentColor;
        border-top: 7px solid transparent;
        border-bottom: 7px solid transparent;
        content: "";
        transform: rotate(45deg);
      }

      .main-menu {
        position: fixed;
        inset: 0;
        z-index: 5;
        display: grid;
        grid-template-columns: minmax(320px, 42vw) minmax(300px, 1fr);
        align-items: center;
        gap: 32px;
        padding: clamp(20px, 5vw, 78px);
        overflow: hidden;
        background:
          linear-gradient(90deg, rgba(18, 30, 26, 0.58), rgba(18, 30, 26, 0.18) 45%, rgba(18, 30, 26, 0.34)),
          var(--menu-background) center / cover no-repeat,
          #172820;
      }

      .main-menu[hidden] {
        display: none;
      }

      .menu-left {
        display: flex;
        flex-direction: column;
        align-items: flex-start;
        gap: 16px;
        max-width: 560px;
      }

      .menu-title {
        margin: 0 0 10px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(38px, 6vw, 82px);
        line-height: 0.92;
        letter-spacing: 0;
        text-shadow: 0 5px 0 rgba(71, 45, 39, 0.55), 0 12px 22px rgba(0, 0, 0, 0.35);
      }

      .menu-section-label {
        color: rgba(255, 255, 255, 0.78);
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 18px;
        text-transform: uppercase;
        text-shadow: 0 2px 6px rgba(0, 0, 0, 0.45);
      }

      .menu-action,
      .menu-mode {
        min-height: 58px;
        border: 0;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1;
        letter-spacing: 0;
        text-align: left;
        text-transform: uppercase;
        transform: skewX(-9deg);
        cursor: pointer;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 20px rgba(0, 0, 0, 0.3));
        transition: background 140ms ease, filter 140ms ease, transform 140ms ease;
      }

      .menu-action span,
      .menu-mode span {
        display: inline-block;
        transform: skewX(9deg);
      }

      .menu-action {
        width: min(470px, 88vw);
        padding: 12px 34px;
        background: linear-gradient(105deg, #cb2e27, #e84b3c 72%, rgba(255, 255, 255, 0) 72%);
      }

      .menu-action:hover {
        transform: translateY(-3px) scale(1.025) skewX(-9deg);
        background: linear-gradient(105deg, #e13a31, #ff6a52 72%, rgba(255, 255, 255, 0) 72%);
        filter: drop-shadow(0 13px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 0 20px rgba(255, 214, 132, 0.35));
      }

      .menu-action:active {
        transform: translateY(2px) scale(0.985) skewX(-9deg);
        filter: drop-shadow(0 5px 0 rgba(0, 0, 0, 0.3)) drop-shadow(0 8px 14px rgba(0, 0, 0, 0.28));
      }

      .menu-modes {
        display: flex;
        flex-direction: column;
        gap: 13px;
        width: min(430px, 84vw);
      }

      .menu-mode {
        position: relative;
        width: 100%;
        padding: 11px 26px;
        background: linear-gradient(105deg, rgba(75, 132, 178, 0.92), rgba(98, 164, 210, 0.86) 78%, rgba(255, 255, 255, 0) 78%);
      }

      .menu-mode.active {
        outline: 2px solid rgba(255, 255, 255, 0.8);
      }

      .menu-mode:not(:disabled):hover {
        transform: translateY(-2px) scale(1.018) skewX(-9deg);
        background: linear-gradient(105deg, rgba(96, 158, 206, 0.96), rgba(129, 190, 232, 0.9) 78%, rgba(255, 255, 255, 0) 78%);
        filter: drop-shadow(0 12px 0 rgba(0, 0, 0, 0.26)) drop-shadow(0 0 18px rgba(255, 255, 255, 0.24));
      }

      .menu-mode:not(:disabled):active {
        transform: translateY(2px) scale(0.99) skewX(-9deg);
        filter: drop-shadow(0 5px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 8px 12px rgba(0, 0, 0, 0.25));
      }

      .menu-mode:disabled {
        cursor: default;
        opacity: 0.72;
        background: linear-gradient(105deg, rgba(74, 77, 88, 0.9), rgba(93, 96, 109, 0.82) 78%, rgba(255, 255, 255, 0) 78%);
      }

      .soon-badge {
        position: absolute;
        right: 40px;
        top: 50%;
        color: rgba(255, 255, 255, 0.7);
        font-size: 14px;
        transform: translateY(-50%) skewX(9deg);
      }

      .menu-settings {
        display: grid;
        gap: 10px;
        width: min(430px, 84vw);
        padding-top: 2px;
      }

      .menu-setting-row,
      .menu-difficulty-row {
        display: grid;
        grid-template-columns: 110px 1fr 34px;
        align-items: center;
        gap: 9px;
        min-height: 30px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 15px;
        text-transform: uppercase;
        text-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      }

      .menu-difficulty-row {
        grid-template-columns: 110px 1fr;
      }

      .menu-difficulty-buttons {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 5px;
      }

      .menu-difficulty-buttons button {
        min-height: 27px;
        border: 1px solid rgba(255, 255, 255, 0.22);
        border-radius: 4px;
        background: rgba(14, 24, 22, 0.66);
        color: #ffffff;
        font: inherit;
        cursor: pointer;
        transition: background 120ms ease, border-color 120ms ease, transform 120ms ease, filter 120ms ease;
      }

      .menu-difficulty-buttons button.active {
        border-color: #ffffff;
        background: rgba(207, 47, 39, 0.88);
      }

      .menu-difficulty-buttons button:hover {
        border-color: rgba(255, 255, 255, 0.7);
        background: rgba(48, 78, 72, 0.82);
        transform: translateY(-1px) scale(1.02);
        filter: brightness(1.12);
      }

      .menu-difficulty-buttons button:active {
        transform: translateY(1px) scale(0.98);
        filter: brightness(0.94);
      }

      .menu-setting-row input {
        width: 100%;
      }

      .menu-setting-row output {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .element-panel {
        justify-self: center;
        display: grid;
        gap: 18px;
      }

      .element-title {
        color: rgba(255, 255, 255, 0.78);
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: 18px;
        text-align: center;
        text-transform: uppercase;
        text-shadow: 0 2px 7px rgba(0, 0, 0, 0.45);
      }

      .element-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(130px, 190px));
        gap: clamp(18px, 4vw, 48px);
      }

      .element-choice {
        width: clamp(132px, 16vw, 196px);
        aspect-ratio: 1.24;
        padding: 0;
        border: 0;
        background: transparent;
        cursor: pointer;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 18px rgba(0, 0, 0, 0.25));
        transition: transform 160ms ease, filter 160ms ease;
      }

      .element-choice img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        pointer-events: none;
      }

      .element-choice:hover {
        transform: translateY(-6px) scale(1.04);
        filter:
          drop-shadow(0 0 0 rgba(255, 255, 255, 0.9))
          drop-shadow(0 14px 0 rgba(0, 0, 0, 0.28))
          drop-shadow(0 0 20px rgba(255, 255, 255, 0.55));
      }

      .element-choice.selected {
        transform: translateY(-8px) scale(1.08);
        filter:
          drop-shadow(0 0 3px rgba(255, 238, 126, 0.95))
          drop-shadow(0 16px 0 rgba(0, 0, 0, 0.25))
          drop-shadow(0 0 28px rgba(255, 217, 61, 0.95))
          drop-shadow(0 0 48px rgba(255, 190, 46, 0.55));
      }

      .element-choice.selected:hover {
        transform: translateY(-10px) scale(1.11);
        filter:
          drop-shadow(0 0 5px rgba(255, 250, 190, 1))
          drop-shadow(0 18px 0 rgba(0, 0, 0, 0.24))
          drop-shadow(0 0 34px rgba(255, 226, 74, 1))
          drop-shadow(0 0 58px rgba(255, 180, 42, 0.7));
      }

      .element-choice:active,
      .element-choice.selected:active {
        transform: translateY(-2px) scale(0.99);
      }

      .settings-panel {
        display: none !important;
      }

      .fps-counter {
        position: fixed;
        top: 10px;
        left: 10px;
        z-index: 6;
        padding: 5px 7px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 4px;
        background: rgba(7, 11, 9, 0.64);
        color: rgba(238, 247, 238, 0.9);
        font: 700 11px/1.1 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        user-select: none;
      }

      .deathmatch-scoreboard-button {
        position: fixed;
        top: 16px;
        right: 10px;
        z-index: 9;
        width: min(300px, calc(100vw - 20px));
        min-height: 58px;
        padding: 12px 28px;
        border: 0;
        background: linear-gradient(105deg, rgba(75, 132, 178, 0.92), rgba(98, 164, 210, 0.86) 78%, rgba(255, 255, 255, 0) 78%);
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(24px, 2.6vw, 36px);
        line-height: 1;
        letter-spacing: 0;
        text-align: left;
        text-transform: uppercase;
        transform: skewX(-9deg);
        cursor: pointer;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 20px rgba(0, 0, 0, 0.3));
        user-select: none;
      }

      .deathmatch-scoreboard-button span {
        display: inline-block;
        transform: skewX(9deg);
      }

      .deathmatch-scoreboard-button.active {
        outline: 2px solid rgba(255, 255, 255, 0.8);
      }

      body:not(.match-started) .deathmatch-scoreboard-button {
        display: none;
      }

      .deathmatch-overlay {
        position: fixed;
        left: 50%;
        top: 50%;
        z-index: 8;
        display: flex;
        flex-direction: column;
        gap: 18px;
        width: 80vw;
        height: 80vh;
        padding: clamp(18px, 3vw, 34px);
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.85);
        box-shadow: 0 22px 60px rgba(0, 0, 0, 0.48);
        color: rgba(238, 247, 238, 0.92);
        transform: translate(-50%, -50%);
        user-select: none;
      }

      .deathmatch-overlay[hidden],
      body:not(.match-started) .deathmatch-overlay {
        display: none;
      }

      .deathmatch-leaderboard {
        min-height: 0;
        overflow: auto;
      }

      .deathmatch-leaderboard-title {
        margin-bottom: 18px;
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(36px, 6vw, 76px);
        line-height: 0.9;
        text-transform: uppercase;
      }

      .deathmatch-leaderboard-table {
        width: 100%;
        border-collapse: collapse;
        font: 800 clamp(16px, 2.2vw, 30px)/1.2 ui-monospace, SFMono-Regular, Consolas, "Liberation Mono", monospace;
        font-variant-numeric: tabular-nums;
      }

      .deathmatch-leaderboard-table th,
      .deathmatch-leaderboard-table td {
        padding: 8px 10px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        text-align: right;
        white-space: nowrap;
      }

      .deathmatch-leaderboard-table th {
        color: rgba(255, 255, 255, 0.58);
        font-size: 0.72em;
        text-transform: uppercase;
      }

      .deathmatch-leaderboard-table th:nth-child(2),
      .deathmatch-leaderboard-table td:nth-child(2) {
        text-align: left;
      }

      .deathmatch-leaderboard-table tr.player td {
        color: #8bd3ff;
      }

      .deathmatch-leaderboard-table tr.respawning td,
      .deathmatch-leaderboard-table tr.invulnerable td {
        color: #ffffff;
      }

      .deathmatch-continue {
        align-self: flex-start;
        width: min(470px, 88vw);
        min-height: 58px;
        margin-top: auto;
        padding: 12px 34px;
        border: 0;
        background: linear-gradient(105deg, rgba(74, 77, 88, 0.9), rgba(93, 96, 109, 0.82) 78%, rgba(255, 255, 255, 0) 78%);
        color: #ffffff;
        font-family: "ZeroCool", Impact, "Arial Black", sans-serif;
        font-size: clamp(24px, 3vw, 42px);
        line-height: 1;
        letter-spacing: 0;
        text-align: left;
        text-transform: uppercase;
        transform: skewX(-9deg);
        pointer-events: auto;
        cursor: default;
        filter: drop-shadow(0 10px 0 rgba(0, 0, 0, 0.28)) drop-shadow(0 16px 20px rgba(0, 0, 0, 0.3));
      }

      .deathmatch-continue span {
        display: inline-block;
        transform: skewX(9deg);
      }

      .deathmatch-continue:disabled {
        opacity: 0.72;
        cursor: default;
      }

      .deathmatch-continue.ready {
        background: linear-gradient(105deg, #d3a421, #f2ce48 72%, rgba(255, 255, 255, 0) 72%);
        cursor: pointer;
      }

      .deathmatch-continue[hidden] {
        display: none;
      }

      .rpm-hud {
        position: fixed;
        top: calc(env(safe-area-inset-top, 0px) + 42px);
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 8px;
        width: min(260px, calc(50vw - 28px));
        pointer-events: none;
        user-select: none;
      }

      .rpm-hud.player {
        left: calc(env(safe-area-inset-left, 0px) + 18px);
      }

      .rpm-hud.enemies {
        top: calc(env(safe-area-inset-top, 0px) + 92px);
        right: calc(env(safe-area-inset-right, 0px) + 18px);
      }

      .settings-panel {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 2;
        display: flex;
        flex-direction: column;
        gap: 7px;
        width: 250px;
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.62);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
        color: rgba(238, 247, 238, 0.86);
        font-size: 12px;
        pointer-events: auto;
        user-select: none;
      }

      .setting-row {
        position: relative;
        display: grid;
        grid-template-columns: 82px 1fr 36px;
        align-items: center;
        gap: 8px;
      }

      .setting-row input {
        width: 100%;
      }

      .setting-row output {
        text-align: right;
        font-variant-numeric: tabular-nums;
      }

      .setting-row.debug-toggle {
        grid-template-columns: 1fr 20px 36px;
      }

      .setting-row:has([data-control-setting]),
      .setting-row.debug-toggle {
        display: none;
      }

      .setting-row.debug-toggle input {
        justify-self: end;
        width: 16px;
        height: 16px;
      }

      .difficulty-row {
        display: grid;
        grid-template-columns: 82px 1fr;
        align-items: center;
        gap: 8px;
      }

      .difficulty-buttons {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 3px;
      }

      .difficulty-buttons button {
        height: 24px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 5px;
        background: rgba(255, 255, 255, 0.08);
        color: rgba(238, 247, 238, 0.82);
        font: inherit;
        cursor: pointer;
      }

      .difficulty-buttons button.active {
        border-color: rgba(77, 172, 255, 0.95);
        background: rgba(24, 120, 255, 0.42);
        color: #ffffff;
      }

      .setting-row:hover::after,
      .difficulty-row:hover::after {
        position: absolute;
        right: 0;
        bottom: calc(100% + 6px);
        width: min(300px, calc(100vw - 24px));
        padding: 7px 8px;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 6px;
        background: rgba(7, 11, 9, 0.92);
        color: #eef7ee;
        content: attr(data-tooltip);
        font-size: 11px;
        line-height: 1.25;
        pointer-events: none;
      }

      .difficulty-row {
        position: relative;
      }

      .rpm-card {
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.62);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }

      .rpm-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 5px;
        font-size: 11px;
        line-height: 1;
        color: rgba(238, 247, 238, 0.82);
        font-variant-numeric: tabular-nums;
      }

      .rpm-track {
        position: relative;
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .rpm-cap,
      .rpm-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 100%;
        border-radius: inherit;
        transform-origin: left center;
      }

      .rpm-cap {
        background: #c92d3b;
      }

      .rpm-fill {
        background: #34d15f;
      }

      .rpm-card.enemy .rpm-fill {
        background: #34d15f;
      }

      .rpm-card.respawning,
      .rpm-card.invulnerable {
        border-color: rgba(255, 255, 255, 0.34);
      }

      .bonus-icons {
        display: flex;
        align-items: center;
        gap: 5px;
        min-height: 25px;
        margin-bottom: 6px;
      }

      .bonus-icons[hidden] {
        display: none;
      }

      .bonus-icon {
        position: relative;
        width: 24px;
        height: 24px;
        overflow: hidden;
        border: 1px solid color-mix(in srgb, var(--bonus-color) 72%, white 28%);
        border-radius: 4px;
        background:
          radial-gradient(circle at 50% 30%, color-mix(in srgb, var(--bonus-color) 48%, transparent), transparent 68%),
          rgba(255, 255, 255, 0.06);
        box-shadow: 0 0 8px color-mix(in srgb, var(--bonus-color) 55%, transparent);
      }

      .bonus-icon-fill,
      .bonus-icon-grid {
        position: absolute;
        inset: 0;
      }

      .bonus-icon-fill {
        background: color-mix(in srgb, var(--bonus-color) 62%, transparent);
        transform-origin: bottom center;
        transition: transform 120ms linear;
      }

      .bonus-icon-grid {
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.26) 1px, transparent 1px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.26) 1px, transparent 1px);
        background-size: 6px 6px;
        opacity: 0.8;
        mix-blend-mode: screen;
      }

      .dash-card,
      .ultimate-card {
        padding: 8px;
        border: 1px solid rgba(255, 255, 255, 0.16);
        border-radius: 7px;
        background: rgba(7, 11, 9, 0.62);
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.22);
      }

      .dash-label,
      .ultimate-label {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 5px;
        font-size: 11px;
        line-height: 1;
        color: rgba(238, 247, 238, 0.82);
        font-variant-numeric: tabular-nums;
        text-transform: uppercase;
      }

      .dash-track,
      .ultimate-track {
        position: relative;
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.14);
      }

      .dash-fill,
      .ultimate-fill {
        position: absolute;
        inset: 0 auto 0 0;
        width: 100%;
        border-radius: inherit;
        background: #4dacff;
        transform-origin: left center;
      }

      .dash-card.ready .dash-fill {
        background: #ffffff;
      }

      .dash-card.active .dash-fill {
        background: #ffd83d;
      }

      .ultimate-fill {
        background: #f26bdc;
      }

      .ultimate-card.ready .ultimate-fill {
        background: #ffffff;
      }

      .ultimate-card.active .ultimate-fill {
        background: #8bd3ff;
      }

      .mobile-controls {
        position: fixed;
        inset: auto 0 0;
        z-index: 4;
        display: none;
        justify-content: space-between;
        align-items: flex-end;
        padding:

    </label>
      <label class="setting-row" data-tooltip="Runtime test control for arena bowl depth. Higher value makes the center lower.">
        <span>Bowl depth</span>
        <input data-bowl-depth type="range" min="0" max="4.2" step="0.02" value="0.46" />
        <output data-bowl-depth-value>0.46</output>
      </label>
      <label class="setting-row" data-tooltip="Slope acceleration strength. Higher value makes downhill faster and uphill harder.">
        <span>Slope gravity</span>
        <input data-slope-setting="slopeGravity" type="range" min="0" max="300" step="0.5" value="8" />
        <output data-slope-value="slopeGravity">8.0</output>
      </label>
      <label class="setting-row" data-tooltip="Extra speed allowed from downhill movement before the velocity cap stops it.">
        <span>Slope boost</span>
        <input data-slope-setting="maxSlopeBoost" type="range" min="0" max="16" step="0.5" value="4" />
        <output data-slope-value="maxSlopeBoost">4.0</output>
      </label>
      <label class="setting-row" data-tooltip="Distance used to sample arena height around the spinner. Higher value smooths small bumps.">
        <span>Slope sample</span>
        <input data-slope-setting="slopeSampleDistance" type="range" min="0.1" max="2" step="0.05" value="0.6" />
        <output data-slope-value="slopeSampleDistance">0.60</output>
      </label>
      <label class="setting-row" data-tooltip="Where soft rim resistance starts as a ratio of arena radius.">
        <span>Rim start</span>
        <input data-rim-setting="rimResistanceStartRatio" type="range" min="0.5" max="1" step="0.01" value="0.82" />
        <output data-rim-value="rimResistanceStartRatio">0.82</output>
      </label>
      <label class="setting-row" data-tooltip="Soft inward force near the white rim. Higher values make the edge harder to cross.">
        <span>Rim force</span>
        <input data-rim-setting="rimResistanceStrength" type="range" min="0" max="240" step="2" value="40" />
        <output data-rim-value="rimResistanceStrength">40.0</output>
      </label>
      <label class="setting-row" data-tooltip="Extra velocity budget used by rim resistance before speed is capped again.">
        <span>Rim boost</span>
        <input data-rim-setting="rimResistanceMaxBoost" type="range" min="0" max="60" step="1" value="12" />
        <output data-rim-value="rimResistanceMaxBoost">12.0</output>
      </label>
      <label class="setting-row" data-tooltip="Максимальная скорость следования за целью при полном RPM. Чем выше значение, тем быстрее спиннер догоняет курсор или AI-цель.">
        <span>Max speed</span>
        <input data-control-setting="baseMoveSpeed" type="range" min="10" max="20" step="0.5" value="16" />
        <output data-control-value="baseMoveSpeed">16.0</output>
      </label>
      <label class="setting-row" data-tooltip="Сила пружины к цели. Больше значение - спиннер агрессивнее ускоряется к курсору или AI-цели, но скорость все равно ограничена Max speed.">
        <span>Spring</span>
        <input data-control-setting="springStrength" type="range" min="1" max="25" step="1" value="15" />
        <output data-control-value="springStrength">15</output>
      </label>
      <label class="setting-row" data-tooltip="Демпфирование пружины. Больше значение сильнее гасит инерцию и перелет, меньше значение делает движение более резиновым.">
        <span>Damping</span>
        <input data-control-setting="springDamping" type="range" min="0" max="5" step="0.5" value="1.5" />
        <output data-control-value="springDamping">1.5</output>
      </label>
      <label class="setting-row" data-tooltip="Минимальная доля скорости при низком RPM. Например 45% значит, что почти выбитый спиннер все еще движется, но сильно медленнее.">
        <span>Low RPM</span>
        <input data-control-setting="minMoveSpeedRatio" type="range" min="0" max="1" step="0.01" value="0.3" />
        <output data-control-value="minMoveSpeedRatio">30%</output>
      </label>
      <label class="setting-row" data-tooltip="Максимальное количество ботов, которые могут одновременно находиться в активной фазе тарана.">
        <span>Attacks</span>
        <input data-control-setting="globalAttackLimit" type="range" min="0" max="9" step="1" value="2" />
        <output data-control-value="globalAttackLimit">2</output>
      </label>
      <label class="setting-row" data-tooltip="Максимальное количество активных таранов по одной и той же цели.">
        <span>Per target</span>
        <input data-control-setting="maxAttackersPerTarget" type="range" min="0" max="5" step="1" value="1" />
        <output data-control-value="maxAttackersPerTarget">1</output>
      </label>
      <label class="setting-row" data-tooltip="Дистанция разгона: бот старается занять эту позицию перед фиксацией тарана.">
        <span>Windup</span>
        <input data-control-setting="windupDistance" type="range" min="1.5" max="6" step="0.1" value="3.2" />
        <output data-control-value="windupDistance">3.2</output>
      </label>
      <label class="setting-row" data-tooltip="Сила локального уклонения, чтобы боты не слипались в толпу.">
        <span>Separate</span>
        <input data-control-setting="separationStrength" type="range" min="0" max="4" step="0.05" value="1.15" />
        <output data-control-value="separationStrength">1.15</output>
      </label>
      <label class="setting-row" data-tooltip="Коэффициент предсказания цели. Время прогноза считается как дистанция, умноженная на это значение.">
        <span>Predict</span>
        <input data-control-setting="predictionTurnFactor" type="range" min="0" max="0.08" step="0.001" value="0.035" />
        <output data-control-value="predictionTurnFactor">0.035</output>
      </label>
      <label class="setting-row" data-tooltip="Время восстановления после завершения или отмены атаки.">
        <span>Cooldown</span>
        <input data-control-setting="attackCooldown" type="range" min="0" max="2" step="0.05" value="0.65" />
        <output data-control-value="attackCooldown">0.65</output>
      </label>
      <label class="setting-row" data-tooltip="Штраф для целей, вокруг которых уже много спиннеров.">
        <span>Crowd</span>
        <input data-control-setting="crowdPenalty" type="range" min="0" max="4" step="0.05" value="1" />
        <output data-control-value="crowdPenalty">1.00</output>
      </label>
      <label class="setting-row" data-tooltip="Минимальная дистанция от бота до его виртуального курсора. Курсор не может заходить внутрь этого радиуса.">
        <span>Cursor radius</span>
        <input data-control-setting="botCursorMinRadius" type="range" min="2" max="10" step="0.1" value="4" />
        <output data-control-value="botCursorMinRadius">4.0</output>
      </label>
      <div class="difficulty-row" data-tooltip="Частота принятия новых AI-решений: Easy 600-1000 мс, Normal 350-600 мс, Hard 200-350 мс.">
        <span>Bot level</span>
        <div class="difficulty-buttons">
          <button data-bot-difficulty="easy" type="button">Easy</button>
          <button data-bot-difficulty="normal" type="button">Normal</button>
          <button data-bot-difficulty="hard" type="button">Hard</button>
        </div>
      </div>
      <label class="setting-row debug-toggle" data-tooltip="Показывает точку, в которую бот реально едет через followTargetPosition.">
        <span>Follow point</span>
        <input data-debug-display="followTarget" type="checkbox" checked />
        <output></output>
      </label>
      <label class="setting-row debug-toggle" data-tooltip="Показывает радиус локального разъезжания вокруг каждого бота.">
        <span>Separate radius</span>
        <input data-debug-display="separationRadius" type="checkbox" checked />
        <output></output>
      </label>
      <label class="setting-row debug-toggle" data-tooltip="Показывает радиус позиции разгона вокруг каждого бота.">
        <span>Windup radius</span>
        <input data-debug-display="windupRadius" type="checkbox" checked />
        <output></output>
      </label>
      <label class="setting-row debug-toggle" data-tooltip="Показывает минимальный радиус виртуального курсора вокруг каждого бота.">
        <span>Cursor radius</span>
        <input data-debug-display="cursorRadius" type="checkbox" checked />
        <output></output>
      </label>
    </div>
    <div class="fps-counter" data-fps-counter>FPS: --</div>
    <button class="deathmatch-scoreboard-button" data-deathmatch-scoreboard type="button" aria-pressed="false">
      <span data-i18n="hud.leaderboard">Leaderboard</span>
    </button>
    <div class="compact-leaderboard" data-compact-leaderboard hidden></div>
    <div class="deathmatch-overlay" data-deathmatch-overlay hidden>
      <div class="deathmatch-leaderboard" data-deathmatch-leaderboard></div>
      <button class="deathmatch-continue" data-deathmatch-continue type="button" hidden disabled>
        <span>Continue</span>
      </button>
    </div>
    <div class="mobile-controls" data-mobile-controls aria-hidden="false">
      <div class="mobile-joystick" data-mobile-joystick role="application" aria-label="Move">
        <div class="mobile-joystick-thumb" data-mobile-joystick-thumb></div>
      </div>
      <div class="mobile-action-buttons">
        <button class="mobile-action-button" data-mobile-dash type="button">
          <span class="mobile-action-cooldown" aria-hidden="true"></span>
          <span data-i18n="hud.dash">Dash</span>
        </button>
        <button class="mobile-action-button" data-mobile-ultimate type="button">
          <span class="mobile-action-cooldown" aria-hidden="true"></span>
          <span data-i18n="hud.ultimate">Ultimate</span>
        </button>
      </div>
    </div>
    <div class="rpm-hud player" data-player-rpm></div>
    <div class="rpm-hud enemies" data-enemy-rpms></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
